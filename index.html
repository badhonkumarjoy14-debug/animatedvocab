<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kanji Study Pro + Progress Tracker</title>

<style>
:root {
  --primary: #2c3e50;
  --accent: #d35400;
  --success: #27ae60;
  --info: #2980b9;
  --bg: #f8f9fa;
  --text: #333;
}

* { box-sizing: border-box; }
body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--text); }

.container { width: 100%; max-width: 1200px; margin: 0 auto; padding: 20px; }

/* --- HEADER & PROGRESS --- */
header {
  background: var(--primary); color: white; padding: 25px; border-radius: 15px;
  margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }

.progress-info { font-size: 14px; font-weight: bold; color: #bdc3c7; margin-bottom: 5px; display: block; }
.progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; overflow: hidden; margin-bottom: 20px; }
#progressBar { width: 0%; height: 100%; background: var(--success); transition: width 0.3s ease; }

/* --- MODE SELECTOR --- */
.mode-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.mode-btn {
  padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.3);
  background: rgba(255,255,255,0.1); color: white; cursor: pointer; font-weight: bold; font-size: 14px;
}
.mode-btn.active { background: var(--accent); border-color: var(--accent); }

/* --- FLASHCARD --- */
.flashcard {
  background: white; border-radius: 20px; padding: 0px 0px;
  text-align: center; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
  border: 1px solid #eee; position: relative;
}
.main-text { font-size: 60px; font-weight: bold; margin: 0; color: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
}
.sub-text { font-size: 48px; color: #7f8c8d; margin: 15px 0; min-height: 55px; }
.meaning-text { font-size: 30px; color: var(--accent); font-weight: bold; margin-bottom: 10px; min-height: 35px; }
.romaji-text { font-size: 22px; color: #95a5a6; font-style: italic; min-height: 25px; }

.hidden { visibility: hidden; opacity: 0; }
.visible { visibility: visible; opacity: 1; transition: opacity 0.3s; }

/* --- CONTROLS --- */
.controls-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 40px; }
.controls-grid button {
  padding: 20px; border-radius: 12px; border: none; font-size: 18px; font-weight: bold;
  cursor: pointer; transition: transform 0.1s;
}
.controls-grid button:active { transform: scale(0.97); }
.btn-reveal { background: var(--success); color: white; grid-column: span 2; }
.btn-stroke { background: var(--info); color: white; grid-column: span 2; }
.btn-nav { background: #eee; color: #555; }

/* --- STROKE SECTION --- */
.stroke-section { display: none; margin-top: 30px; border-top: 5px solid var(--primary); padding-top: 40px; }
.kanji-row { background: white; padding: 35px; border-radius: 20px; margin-bottom: 40px; border: 1px solid #ddd; }
.kanji-info { display: flex; align-items: center; gap: 25px; margin-bottom: 25px; }
.btn-animate { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: bold; }

.writing-area { display: flex; flex-wrap: wrap; gap: 20px; overflow-x: auto; padding-bottom: 10px; }
.stroke-box {
  width: 180px; height: 180px; border: 1px solid #ccc; flex-shrink: 0;
  background-image: linear-gradient(to right, #f5f5f5 1px, transparent 1px), linear-gradient(to bottom, #f5f5f5 1px, transparent 1px);
  background-size: 50% 50%; display: flex; align-items: center; justify-content: center;
}
.stroke-box svg { width: 150px; height: 150px; }
path { fill: none; stroke: #333; stroke-width: 3.5; stroke-linecap: round; stroke-linejoin: round; }

@keyframes writePath { to { stroke-dashoffset: 0; } }

@media (max-width: 768px) {
  .main-text { font-size: 70px; }
  .stroke-box { width: 150px; height: 150px; }
  .controls-grid button { padding: 15px; font-size: 14px; }
}
</style>
</head>

let currentDeck = [];
let index = 0;
let mode = 'K2M'; 

// --- NEW SHUFFLE FUNCTION ---
function shuffleDeck() {
  // Fisher-Yates Shuffle Algorithm
  for (let i = currentDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [currentDeck[i], currentDeck[j]] = [currentDeck[j], currentDeck[i]];
  }
  index = 0; // Reset to start of the newly shuffled deck
  resetCard();
}
// ----------------------------

function init() {
  const select = document.getElementById("setSelect");
  Object.keys(allLessons).forEach(l => {
    const opt = document.createElement("option");
    opt.value = l; opt.textContent = l;
    select.appendChild(opt);
  });
  loadDeck();
}

function setMode(newMode) {
  mode = newMode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`btn-${mode}`).classList.add('active');
  resetCard();
}

function loadDeck() {
  // Copy the lesson array so we don't permanently mess up the original order
  currentDeck = [...allLessons[document.getElementById("setSelect").value]];
  
  // Automatically shuffle when a new lesson is selected
  shuffleDeck(); 
  
  index = 0;
  resetCard();
}

function updateProgress() {
  const total = currentDeck.length;
  const current = index + 1;
  const percentage = Math.round((current / total) * 100);
  
  document.getElementById("progressText").textContent = `Word ${current} of ${total} (${percentage}%)`;
  document.getElementById("progressBar").style.width = `${percentage}%`;
}

function resetCard() {
  document.getElementById("strokeSection").style.display = "none";
  ["displaySub", "displayMeaning", "displayRomaji"].forEach(id => {
    document.getElementById(id).classList.remove("visible");
    document.getElementById(id).classList.add("hidden");
  });
  
  const card = currentDeck[index];
  const main = document.getElementById("displayMain");
  const sub = document.getElementById("displaySub");
  const mean = document.getElementById("displayMeaning");
  const rom = document.getElementById("displayRomaji");

  // Logic to handle empty decks or errors
  if(!card) return;

  if (mode === 'K2M') {
    main.textContent = card.kanji;
    sub.textContent = card.word;
    mean.textContent = card.meaning;
    rom.textContent = card.romaji;
  } else if (mode === 'S2MK') {
    main.textContent = card.word;
    sub.textContent = card.kanji;
    mean.textContent = card.meaning;
    rom.textContent = card.romaji;
  } else {
    main.textContent = card.meaning;
    sub.textContent = card.kanji;
    mean.textContent = card.word;
    rom.textContent = card.romaji;
  }
  updateProgress();
}

function reveal() {
  ["displaySub", "displayMeaning", "displayRomaji"].forEach(id => {
    document.getElementById(id).classList.remove("hidden");
    document.getElementById(id).classList.add("visible");
  });
}

function changeCard(step) {
  index = (index + step + currentDeck.length) % currentDeck.length;
  resetCard();
}

// ... (Rest of your Stroke/Animation functions remain the same)

document.getElementById("setSelect").onchange = loadDeck;
init();

function toggleStrokes() {
  const section = document.getElementById("strokeSection");
  if (section.style.display === "block") {
    section.style.display = "none";
  } else {
    reveal();
    section.style.display = "block";
    renderStrokes();
  }
}

async function renderStrokes() {
  const section = document.getElementById("strokeSection");
  const card = currentDeck[index];
  const kanjis = card.kanji.split('').filter(c => /[一-龯]/.test(c));
  section.innerHTML = "";

  for (let i = 0; i < kanjis.length; i++) {
    const char = kanjis[i];
    const reading = card.readings ? card.readings[i] : "";
    const hex = char.charCodeAt(0).toString(16).padStart(5, '0');
    
    const row = document.createElement("div");
    row.className = "kanji-row";
    row.innerHTML = `
      <div class="kanji-info">
        <span style="font-size: 50px; font-weight: bold;">${char}</span>
        <span style="font-size: 25px; color: var(--accent);">${reading}</span>
        <button class="btn-animate" onclick="playAnimation('${hex}')">▶ WRITING PATTERN</button>
      </div>
      <div class="writing-area" id="area-${hex}"></div>
    `;
    section.appendChild(row);

    try {
      const resp = await fetch(`https://raw.githubusercontent.com/KanjiVG/kanjivg/master/kanji/${hex}.svg`);
      const svgText = await resp.text();
      const area = document.getElementById(`area-${hex}`);
      const parser = new DOMParser();
      const svgDoc = parser.parseFromString(svgText, "image/svg+xml");
      const paths = svgDoc.querySelectorAll('path');

      const animBox = document.createElement("div");
      animBox.className = "stroke-box";
      animBox.id = `anim-box-${hex}`;
      animBox.innerHTML = svgText;
      animBox.style.border = "3px solid var(--accent)";
      area.appendChild(animBox);

      for (let j = 1; j <= paths.length; j++) {
        const box = document.createElement("div");
        box.className = "stroke-box";
        const clone = svgDoc.documentElement.cloneNode(true);
        const cPaths = clone.querySelectorAll('path');
        cPaths.forEach((p, pIdx) => {
          if (pIdx < j) p.style.stroke = (pIdx === j - 1) ? "#d00" : "#333";
          else p.style.display = "none";
        });
        box.appendChild(clone);
        area.appendChild(box);
      }
    } catch (e) { console.error(e); }
  }
}

function playAnimation(hex) {
  const box = document.getElementById(`anim-box-${hex}`);
  const paths = box.querySelectorAll('path');
  paths.forEach((path, i) => {
    path.style.strokeDasharray = "1000";
    path.style.strokeDashoffset = "1000";
    path.style.animation = "none";
    void path.offsetWidth; 
    path.style.animation = `writePath 1s ease-in-out forwards`;
    path.style.animationDelay = `${i * 0.7}s`;
  });
}

document.getElementById("setSelect").onchange = loadDeck;
